<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — JobSerbia</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { blue: { 600: '#2563EB' }, slate: { 50: '#F8FAFC', 500: '#64748B', 800: '#1E293B' } } } }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">

    <header class="sticky top-0 z-40 bg-white border-b border-slate-200">
        <div class="max-w-[1200px] mx-auto px-4 h-[72px] flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-2xl font-bold text-slate-800">JobSerbia</a>
                <span class="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-medium">Админка</span>
            </div>
            <button onclick="logout()" class="text-slate-500 hover:text-red-600 text-sm font-medium">Выйти</button>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-4 py-8">
        <!-- Форма входа (показывается, если не авторизован) -->
        <div id="login-section" class="max-w-md mx-auto bg-white p-8 rounded-[16px] shadow-sm border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Вход в админ-панель</h2>
            <input type="password" id="admin-password" placeholder="Введите пароль" 
                   class="w-full px-4 min-h-[48px] rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600 mb-4">
            <button onclick="login()" class="w-full min-h-[48px] rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition">
                Войти
            </button>
            <p class="text-sm text-slate-400 mt-4 text-center">Пароль по умолчанию: <strong>admin123</strong></p>
        </div>

        <!-- Админ-панель (скрыта до входа) -->
        <div id="admin-panel" class="hidden">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
                <h1 class="text-2xl font-bold text-slate-800">Управление вакансиями</h1>
                <div class="flex gap-3">
                    <span id="stats" class="text-sm text-slate-500 bg-white px-4 py-2 rounded-xl border border-slate-200"></span>
                    <button onclick="refreshList()" class="min-h-[48px] px-6 rounded-xl bg-slate-800 text-white font-medium hover:bg-slate-700 transition">
                        🔄 Обновить
                    </button>
                </div>
            </div>

            <!-- Таблица с вакансиями -->
            <div class="bg-white rounded-[16px] border border-slate-200 overflow-hidden shadow-sm">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr class="text-left">
                                <th class="px-4 py-3 font-medium text-slate-500">Статус</th>
                                <th class="px-4 py-3 font-medium text-slate-500">Должность</th>
                                <th class="px-4 py-3 font-medium text-slate-500 hidden sm:table-cell">Компания</th>
                                <th class="px-4 py-3 font-medium text-slate-500 hidden md:table-cell">Город</th>
                                <th class="px-4 py-3 font-medium text-slate-500 hidden lg:table-cell">Дата</th>
                                <th class="px-4 py-3 font-medium text-slate-500 text-center">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="admin-vacancies-list">
                            <tr><td colspan="6" class="text-center py-8 text-slate-400">Загрузка...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Модалка редактирования -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[16px] max-w-lg w-full max-h-[90vh] overflow-y-auto p-6">
            <h3 class="text-xl font-bold text-slate-800 mb-4">✏️ Редактировать вакансию</h3>
            <form id="edit-form" class="flex flex-col gap-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block font-medium text-slate-700 mb-1">Должность</label>
                    <input type="text" id="edit-title" class="w-full px-4 min-h-[48px] rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600">
                </div>
                <div>
                    <label class="block font-medium text-slate-700 mb-1">Компания</label>
                    <input type="text" id="edit-company" class="w-full px-4 min-h-[48px] rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600">
                </div>
                <div>
                    <label class="block font-medium text-slate-700 mb-1">Город</label>
                    <select id="edit-city" class="w-full px-4 min-h-[48px] rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600">
                        <option value="Белград">Белград</option>
                        <option value="Нови-Сад">Нови-Сад</option>
                        <option value="Ниш">Ниш</option>
                        <option value="Крагуевац">Крагуевац</option>
                        <option value="Суботица">Суботица</option>
                        <option value="Другие">Другие</option>
                    </select>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block font-medium text-slate-700 mb-1">ЗП от (€)</label>
                        <input type="number" id="edit-salary-min" class="w-full px-4 min-h-[48px] rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600">
                    </div>
                    <div class="flex-1">
                        <label class="block font-medium text-slate-700 mb-1">ЗП до (€)</label>
                        <input type="number" id="edit-salary-max" class="w-full px-4 min-h-[48px] rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600">
                    </div>
                </div>
                <div>
                    <label class="block font-medium text-slate-700 mb-1">Контакты</label>
                    <input type="text" id="edit-contacts" class="w-full px-4 min-h-[48px] rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600">
                </div>
                <div>
                    <label class="block font-medium text-slate-700 mb-1">Описание</label>
                    <textarea id="edit-description" rows="4" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600 resize-y"></textarea>
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="edit-active" class="w-5 h-5">
                    <label for="edit-active" class="font-medium text-slate-700">Активна (показывать на сайте)</label>
                </div>
                <div class="flex gap-3 mt-2">
                    <button type="submit" class="flex-1 min-h-[48px] rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition">Сохранить</button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 min-h-[48px] rounded-xl border border-slate-300 text-slate-700 font-medium hover:bg-slate-50 transition">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // --- КОНСТАНТЫ ---
        const ADMIN_PASSWORD = 'admin123'; // Смените на свой пароль!
        let isLoggedIn = false;

        // --- ВХОД ---
        function login() {
            const pass = document.getElementById('admin-password').value;
            if (pass === ADMIN_PASSWORD) {
                isLoggedIn = true;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadVacancies();
            } else {
                alert('Неверный пароль!');
            }
        }

        // Вход по Enter
        document.getElementById('admin-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        function logout() {
            isLoggedIn = false;
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('admin-password').value = '';
        }

        // --- ЗАГРУЗКА ВСЕХ ВАКАНСИЙ (включая неактивные) ---
        async function loadVacancies() {
            const tbody = document.getElementById('admin-vacancies-list');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-slate-400">Загрузка...</td></tr>';

            const { data, error } = await supabaseClient
                .from('vacancies')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-500">Ошибка: ${error.message}</td></tr>`;
                return;
            }

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-slate-400">Нет вакансий</td></tr>';
                document.getElementById('stats').textContent = 'Всего: 0';
                return;
            }

            document.getElementById('stats').textContent = `Всего: ${data.length} | Активных: ${data.filter(v => v.is_active).length}`;

            tbody.innerHTML = data.map(job => `
                <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                    <td class="px-4 py-3">
                        ${job.is_active 
                            ? '<span class="text-green-600 text-xl">✅</span>' 
                            : '<span class="text-red-400 text-xl">⛔</span>'}
                    </td>
                    <td class="px-4 py-3 font-medium text-slate-800">${job.title}</td>
                    <td class="px-4 py-3 text-slate-600 hidden sm:table-cell">${job.company}</td>
                    <td class="px-4 py-3 text-slate-500 hidden md:table-cell">${job.city}</td>
                    <td class="px-4 py-3 text-slate-400 text-sm hidden lg:table-cell">${new Date(job.created_at).toLocaleDateString()}</td>
                    <td class="px-4 py-3">
                        <div class="flex gap-2 justify-center">
                            <button onclick="editVacancy('${job.id}')" class="px-3 py-1.5 rounded-lg bg-blue-100 text-blue-700 text-sm font-medium hover:bg-blue-200 transition">
                                ✏️
                            </button>
                            <button onclick="deleteVacancy('${job.id}')" class="px-3 py-1.5 rounded-lg bg-red-100 text-red-600 text-sm font-medium hover:bg-red-200 transition">
                                🗑️
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function refreshList() {
            loadVacancies();
        }

        // --- УДАЛЕНИЕ ---
        async function deleteVacancy(id) {
            if (!confirm('Вы уверены, что хотите удалить эту вакансию? Это действие необратимо!')) {
                return;
            }

            const { error } = await supabaseClient.from('vacancies').delete().eq('id', id);

            if (error) {
                alert('Ошибка удаления: ' + error.message);
            } else {
                showToast('✅ Вакансия удалена');
                loadVacancies();
            }
        }

        // --- РЕДАКТИРОВАНИЕ ---
        async function editVacancy(id) {
            const { data, error } = await supabaseClient.from('vacancies').select('*').eq('id', id).single();

            if (error || !data) {
                alert('Ошибка загрузки данных для редактирования');
                return;
            }

            // Заполняем форму
            document.getElementById('edit-id').value = data.id;
            document.getElementById('edit-title').value = data.title || '';
            document.getElementById('edit-company').value = data.company || '';
            document.getElementById('edit-city').value = data.city || 'Белград';
            document.getElementById('edit-salary-min').value = data.salary_min || '';
            document.getElementById('edit-salary-max').value = data.salary_max || '';
            document.getElementById('edit-contacts').value = data.contacts || '';
            document.getElementById('edit-description').value = data.description || '';
            document.getElementById('edit-active').checked = data.is_active;

            document.getElementById('edit-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // запрещаем скролл фона
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // Закрытие по клику на фон
        document.getElementById('edit-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeEditModal();
        });

        // --- СОХРАНЕНИЕ ИЗМЕНЕНИЙ ---
        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('edit-id').value;
            const updated = {
                title: document.getElementById('edit-title').value.trim(),
                company: document.getElementById('edit-company').value.trim(),
                city: document.getElementById('edit-city').value,
                salary_min: parseInt(document.getElementById('edit-salary-min').value) || null,
                salary_max: parseInt(document.getElementById('edit-salary-max').value) || null,
                contacts: document.getElementById('edit-contacts').value.trim(),
                description: document.getElementById('edit-description').value.trim(),
                is_active: document.getElementById('edit-active').checked
            };

            const { error } = await supabaseClient.from('vacancies').update(updated).eq('id', id);

            if (error) {
                alert('Ошибка сохранения: ' + error.message);
            } else {
                showToast('✅ Вакансия обновлена');
                closeEditModal();
                loadVacancies();
            }
        });

        // --- ПРОВЕРКА, ВОШЛИ ЛИ МЫ (если пароль уже сохранён в sessionStorage) ---
        // Простая "запоминалка" — чтобы не вводить пароль при обновлении страницы
        if (sessionStorage.getItem('admin_logged') === 'true') {
            document.getElementById('admin-password').value = ADMIN_PASSWORD;
            login();
        }

        // Сохраняем состояние входа при успешном логине (переопределяем login)
        const originalLogin = login;
        login = function() {
            const pass = document.getElementById('admin-password').value;
            if (pass === ADMIN_PASSWORD) {
                isLoggedIn = true;
                sessionStorage.setItem('admin_logged', 'true');
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadVacancies();
            } else {
                alert('Неверный пароль!');
            }
        };
        // Переопределяем logout
        const originalLogout = logout;
        logout = function() {
            isLoggedIn = false;
            sessionStorage.removeItem('admin_logged');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('admin-password').value = '';
        };
    </script>
</body>
</html>
