<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFFFFF">
    <title>JobSerbia — Работа в Сербии</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { blue: { 600: '#2563EB' }, slate: { 50: '#F8FAFC', 500: '#64748B', 800: '#1E293B' } } } }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-white">

    <header class="sticky top-0 z-40 bg-white border-b border-slate-200">
        <div class="max-w-[800px] mx-auto px-4 h-[72px] flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold text-slate-800">JobSerbia</a>
            <div class="flex gap-4 items-center">
                <a href="about.html" class="text-slate-500 hover:text-blue-600 about-link">
                    <span>О проекте</span>
                </a>
                <a href="publish.html" class="min-h-[48px] px-6 rounded-xl bg-blue-600 text-white font-medium flex items-center justify-center hover:bg-blue-700 transition">Опубликовать</a>
            </div>
        </div>
    </header>

    <section class="bg-slate-50 border-b border-slate-200 py-4">
        <div class="max-w-[800px] mx-auto px-4 flex flex-col gap-3 sm:flex-row">
            <div class="relative flex-1">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
                <input type="text" id="search-input" placeholder="Должность, компания..." 
                    class="w-full pl-10 pr-4 min-h-[48px] rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600">
            </div>
            
            <div class="flex gap-3">
                <select id="city-filter" class="w-full sm:w-[150px] px-4 min-h-[48px] rounded-xl border border-slate-300 bg-white focus:outline-none focus:border-blue-600 text-slate-800">
                    <option value="">Все города</option>
                    <option value="Белград">Белград</option>
                    <option value="Нови-Сад">Нови-Сад</option>
                    <option value="Ниш">Ниш</option>
                    <option value="Крагуевац">Крагуевац</option>
                    <option value="Суботица">Суботица</option>
                    <option value="Другие">Другие</option>
                </select>

                <input type="number" id="salary-min" placeholder="€ От" class="w-20 px-3 min-h-[48px] rounded-xl border border-slate-300 focus:outline-none focus:border-blue-600">
            </div>
            <button id="apply-filters" class="min-h-[48px] px-6 rounded-xl bg-slate-800 text-white font-medium hover:bg-slate-700 w-full sm:w-auto">Искать</button>
        </div>
    </section>

    <main class="max-w-[800px] mx-auto px-4 py-8">
        <div id="vacancies-container" class="flex flex-col gap-4">
            <div id="loader" class="text-center py-10 text-slate-500">Загрузка вакансий...</div>
        </div>

        <div id="empty-state" class="hidden text-center py-12">
            <div class="text-4xl mb-4">🤷‍♂️</div>
            <h3 class="text-lg font-medium text-slate-800">По вашему запросу ничего не найдено</h3>
            <p class="text-slate-500 mt-2">Попробуйте изменить фильтры поиска.</p>
        </div>

        <button id="load-more-btn" class="hidden w-full mt-6 min-h-[48px] rounded-xl border-2 border-slate-200 text-slate-800 font-medium hover:border-slate-300 hover:bg-slate-50 transition">
            Загрузить ещё
        </button>
    </main>

    <script src="app.js"></script>
    <script>
        let currentPage = 0;
        const ITEMS_PER_PAGE = 20;

        const container = document.getElementById('vacancies-container');
        const loader = document.getElementById('loader');
        const emptyState = document.getElementById('empty-state');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const applyFiltersBtn = document.getElementById('apply-filters');

        // Создание HTML-карточки
        function createCardHtml(job) {
            return `
                <a href="vacancy.html?id=${job.id}" class="block bg-slate-50 rounded-[16px] p-4 shadow-sm border border-slate-100 hover:shadow-md transition cursor-pointer">
                    <div class="flex justify-between items-start gap-4">
                        <div>
                            <h2 class="text-[18px] font-bold text-slate-800 mb-1 leading-tight">${job.title}</h2>
                            <p class="text-[15px] text-slate-800 font-medium mb-2">🏢 ${job.company}</p>
                            <p class="text-[15px] text-slate-500">
                                📍 ${job.city} <span class="mx-2">•</span> 💰 ${formatSalary(job.salary_min, job.salary_max)}
                            </p>
                        </div>
                        <span class="text-sm text-slate-400 whitespace-nowrap">${timeAgo(job.created_at)}</span>
                    </div>
                </a>
            `;
        }

        // Загрузка данных
        async function fetchVacancies(reset = false) {
            if (reset) {
                currentPage = 0;
                container.innerHTML = '';
                emptyState.classList.add('hidden');
                loadMoreBtn.classList.add('hidden');
                if(!container.querySelector('#loader')) container.appendChild(loader);
                loader.classList.remove('hidden');
            }

            const searchVal = document.getElementById('search-input').value.trim();
            const cityVal = document.getElementById('city-filter').value;
            const salaryMinVal = document.getElementById('salary-min').value;

            let query = supabaseClient.from('vacancies').select('*').eq('is_active', true).order('created_at', { ascending: false });

            // Применяем фильтры
            if (searchVal) {
                // Поиск по нескольким колонкам (ilike - регистронезависимо)
                query = query.or(`title.ilike.%${searchVal}%,company.ilike.%${searchVal}%,description.ilike.%${searchVal}%`);
            }
            if (cityVal) {
                query = query.eq('city', cityVal);
            }
            if (salaryMinVal) {
                query = query.gte('salary_min', salaryMinVal);
            }

            // Пагинация
            const start = currentPage * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE - 1;
            query = query.range(start, end);

            const { data, error } = await query;

            loader.classList.add('hidden');

            if (error) {
                console.error("Ошибка загрузки:", error);
                return;
            }

            if (reset && data.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            data.forEach(job => {
                container.insertAdjacentHTML('beforeend', createCardHtml(job));
            });

            if (data.length === ITEMS_PER_PAGE) {
                loadMoreBtn.classList.remove('hidden');
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        // Обработчики
        applyFiltersBtn.addEventListener('click', () => fetchVacancies(true));
        document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchVacancies(true) });
        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            fetchVacancies();
        });

        // Ограничение на ввод зарплаты (не более 4 цифр)
        document.getElementById('salary-min').addEventListener('input', function() {
            if (this.value.length > 4) {
                this.value = this.value.slice(0, 4);
            }
        });

        // Первый рендер
        fetchVacancies(true);
    </script>
</body>
</html>
